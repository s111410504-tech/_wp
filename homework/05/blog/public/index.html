<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Blog</h1>
    <nav>
      <button id="show-posts-btn" class="nav-btn active">所有貼文</button>
      <button id="my-posts-btn" class="nav-btn">我的貼文</button>
      <span id="auth-section"></span>
    </nav>
  </header>

  <main>
    <section id="auth-section-main" class="section">
      <div id="login-form-container">
        <h2>登入</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="login-username">帳號</label>
            <input type="text" id="login-username" required>
          </div>
          <div class="form-group">
            <label for="login-password">密碼</label>
            <input type="password" id="login-password" required>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary">登入</button>
            <button type="button" id="show-register-btn" class="btn secondary">註冊</button>
          </div>
        </form>
        <p id="login-error" class="error"></p>
      </div>
      <div id="register-form-container" style="display:none;">
        <h2>註冊</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="register-username">帳號</label>
            <input type="text" id="register-username" required minlength="3">
          </div>
          <div class="form-group">
            <label for="register-password">密碼</label>
            <input type="password" id="register-password" required minlength="6">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn primary">註冊</button>
            <button type="button" id="show-login-btn" class="btn secondary">返回登入</button>
          </div>
        </form>
        <p id="register-error" class="error"></p>
      </div>
    </section>

    <section id="new-post-section" class="section">
      <h2>發佈新貼文</h2>
      <form id="post-form">
        <input type="hidden" id="post-id">
        <div class="form-group">
          <label for="post-title">標題</label>
          <input type="text" id="post-title" placeholder="標題（可選）">
        </div>
        <div class="form-group">
          <label for="post-content">內容</label>
          <textarea id="post-content" rows="4" placeholder="你在想什麼？"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn primary">發佈</button>
          <button type="button" id="cancel-btn" class="btn secondary">取消</button>
        </div>
      </form>
    </section>

    <section id="posts-section" class="section">
      <h2>所有貼文</h2>
      <div id="posts-container"></div>
    </section>

    <section id="my-posts-section" class="section">
      <h2>我的貼文</h2>
      <div id="my-posts-container"></div>
    </section>

    <section id="user-posts-section" class="section">
      <h2 id="user-posts-title">作者貼文</h2>
      <div id="user-posts-container"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
